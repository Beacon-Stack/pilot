run:
  timeout: 5m
  exclude-dirs:
    - web/ui/node_modules
    - vendor

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - misspell
    - noctx
    - bodyclose
    - goimports
    - revive
    - gosec
    - nilerr
    - exhaustive

linters-settings:
  goimports:
    local-prefixes: github.com/screenarr/screenarr

  revive:
    rules:
      - name: exported
        severity: warning
      - name: var-naming
        severity: warning

  gosec:
    excludes:
      - G304
      - G115

  exhaustive:
    default-signifies-exhaustive: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec

    - path: internal/db/generated/
      linters:
        - all
