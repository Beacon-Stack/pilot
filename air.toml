# Air hot-reload configuration for Pilot development.
# Install: go install github.com/air-verse/air@latest
# Run: air

root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/pilot"
  cmd = "go build -o ./tmp/pilot ./cmd/pilot"
  delay = 1000
  exclude_dir = ["bin", "tmp", "web/ui/node_modules", "web/ui/dist", "vendor"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "sql", "yaml"]
  kill_delay = "1s"

[log]
  time = false

[misc]
  clean_on_exit = true
